name: update-data

on:
  # GitHub's floor is 5 min, and schedules are BEST-EFFORT: runs are delayed
  # or dropped under load (worst around the top of the hour), so the delivered
  # cadence is always slower than what's asked for. 10 min is a request, not a
  # guarantee -- the page flags airport data older than 45 min as stale.
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}       # manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # stdlib only -- no pip install step. Scoped to T1 (Harvey Milk / Club
      # SFO): security uses the best T1 line and departures count T1 only;
      # FAA delays stay airport-wide. No secrets needed -- every wired source
      # is keyless (approach/drive are dormant).
      - name: Refresh data.json
        run: python -m sfo.publish --dir docs --terminal T1

      - name: Commit if changed
        run: |
          git config user.name "sfo-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && exit 0
          git commit -m "data: $(date -u +%FT%TZ)"
          git push
