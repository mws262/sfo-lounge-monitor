name: update-data

on:
  schedule:
    - cron: "*/20 * * * *"   # best-effort; GitHub may delay a few minutes
  workflow_dispatch: {}       # manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # stdlib only -- no pip install step.
      # Scoped to T1 (Harvey Milk / Club SFO): security scores the best T1
      # line, departures count T1 only; fog + ground delay stay airport-wide.
      # SFO_TOMTOM_API_KEY (repo secret) enables the approach-congestion
      # signal; absent, the module stays inert and weights renormalize.
      - name: Refresh data.json
        run: python -m sfo.publish --dir docs --terminal T1
        env:
          SFO_TOMTOM_API_KEY: ${{ secrets.SFO_TOMTOM_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "sfo-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && exit 0
          git commit -m "data: $(date -u +%FT%TZ)"
          git push
