# Copy to config.toml and fill in. NOTHING here is required for the
# confirmed-working signals -- every wired source is keyless. Only the
# optional drive-time row needs a credential, and it stays inert (row
# omitted) until configured.
#
# Every value can also be set via an env var: SFO_<SECTION>_<KEY>, e.g.
#   SFO_TOMTOM_API_KEY, SFO_DRIVE_ORIGIN.
# Env vars win over this file. On GitHub Actions these come from repo
# secrets (gh secret set SFO_TOMTOM_API_KEY / SFO_DRIVE_ORIGIN).

[tomtom]
# Free key (no card) from developer.tomtom.com. Powers the "Drive to T1"
# row (Routing API; 1 call per refresh of the free 2,500/day) and the
# dormant approach.py congestion probes.
api_key = ""

[drive]
# Origins as "lat,lng" -- COORDINATES ONLY, no addresses, so nothing
# personal ever appears in a tracked file or the published data.json (which
# carries just the minutes). Geocode once (e.g. OSM Nominatim) and paste.
origin = ""      # -> "Drive to T1" row on the SFO tab
sea_origin = ""  # -> "Drive to SEA" row on the SEA tab

[google]
# Google Cloud "Routes API" key -- only for the dormant drive.py module.
routes_api_key = ""
